name: Build and push Docker images

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (generic)
        id: meta-generic
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ncrosty58/imap-idle-hook
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Docker metadata (espocrm)
        id: meta-espocrm
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ncrosty58/imap-idle-hook
          tags: |
            type=raw,value=espocrm,enable={{is_default_branch}}
            type=raw,value=espocrm-{{version}},enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push generic image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-generic.outputs.tags }}
          labels: ${{ steps.meta-generic.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push EspoCRM image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: espocrm/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-espocrm.outputs.tags }}
          labels: ${{ steps.meta-espocrm.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
